name: CI - Lint & Test

on:
  push:
    branches:
      - master
      - main
      - 'feature/**'
  pull_request:
    branches:
      - master
      - main

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: Run ShellCheck
        run: |
          shellcheck bin/abm
          shellcheck lib/*.sh
          shellcheck *.sh

      - name: Bash syntax validation
        run: |
          for f in bin/abm lib/*.sh *.sh; do
            bash -n "$f"
          done

      - name: Run Unit Tests
        run: |
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh
